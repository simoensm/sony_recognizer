name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --no-frozen-lockfile until the first lockfile is committed;
      # switch to --frozen-lockfile right after.
      - run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Build-time-only values; nothing connects during a build.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: ci
          S3_SECRET_KEY: ci
          S3_BUCKET: ci
          BETTER_AUTH_SECRET: ci-only-secret-not-used-anywhere
          BETTER_AUTH_URL: http://localhost:3000

  python:
    name: Python worker (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check apps/worker

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
